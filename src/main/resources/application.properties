spring.application.name=turnapp
server.port=${SERVER_PORT:8000}

application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=${JWT_EXPIRATION:3600000}
application.security.jwt.refresh-token.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# PostgreSQL Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/turnapp}
spring.datasource.username=${DB_USERNAME:jorge.perez}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.shunnior.turnapp=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SPRING:INFO}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized